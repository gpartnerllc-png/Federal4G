<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<title>x-Partner- Consolidação de Performance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow" />

        img:is([sizes=auto i],[sizes^="auto," i]){contain-intrinsic-size:3000px 1500px}
    </style>

        :root{--wp-admin-theme-color:#007cba;--wp-admin-theme-color--rgb:0,124,186;--wp-admin-theme-color-darker-10:#006ba1;--wp-admin-theme-color-darker-10--rgb:0,107,161;--wp-admin-theme-color-darker-20:#005a87;--wp-admin-theme-color-darker-20--rgb:0,90,135;--wp-admin-theme-color-light-10:#008d32;--wp-admin-theme-color-light-10--rgb:0,141,50;--wp-admin-theme-color-light-20:#009e3e;--wp-admin-theme-color-light-20--rgb:0,158,62;--wp-admin-theme-color-light-70:#78dcfa;--wp-admin-theme-color-light-70--rgb:120,220,250;--wp-block-synced-color:#7a5df5;--wp-block-synced-color--rgb:122,93,245;--wp-bound-block-color:#9747ff}
        .has-basic-font-size{font-size:16px;}
    </style>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="text/javascript" id="emoji-settings-js">
        window._wpemojiSettings = {"baseUrl":"https:\/\/s.w.org\/images\/core\/emoji\/15.0.3\/72x72\/","ext":".png","svgUrl":"https:\/\/s.w.org\/images\/core\/emoji\/15.0.3\/svg\/","svgExt":".svg","source":{"concatemoji":"./assets/js/wp-emoji-release.min.js"}};

</head>

<body class="home page-template-default page bg-slate-50">
    <div id="page" class="site">
        <header id="masthead" class="site-header bg-white shadow-sm mb-8">
            <div class="container mx-auto px-4 py-6 flex justify-between items-center">
                <div class="site-branding">
                    <h1 class="text-2xl font-black text-indigo-700 tracking-tighter">x-Partner</h1>
                </div>
                <nav class="hidden md:block">
                    <span class="text-xs font-mono bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full">CONTROLE POR ENTREGA ATIVO</span>
                </nav>
            </div>
        </header>

        <main id="primary" class="site-main container mx-auto px-4">
            <article class="bg-white rounded-3xl shadow-xl overflow-hidden max-w-4xl mx-auto border border-gray-100">
                <div class="entry-content p-8 md:p-12">
                    <div class="text-center mb-12">
                        <h2 class="text-4xl font-bold text-gray-900 mb-4">Consolidação de Dados</h2>
                        <p class="text-gray-500 max-w-lg mx-auto">Interface de monitoramento para transição de métricas de jornada para métricas de KPIs.</p>
                    </div>

                    <form action="#" method="post" id="sandx-main-form" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-gray-700">Nome / Razão Social</label>
                                <input type="text" name="nome" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none transition-all">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-gray-700">Identificação (CPF/CNPJ)</label>
                                <input type="text" name="doc" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none transition-all">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700">E-mail Corporativo</label>
                            <input type="email" name="email" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none transition-all">
                        </div>

                        <div class="bg-indigo-50 p-6 rounded-3xl border border-indigo-100">
                            <h4 class="text-xs font-bold text-indigo-600 uppercase tracking-widest mb-4">Parâmetros de Performance</h4>
                            <select name="kpi_type" class="w-full p-3 bg-white border border-indigo-200 rounded-xl outline-none">
                                <option value="sys_android">Sistemas Termux</option>
                                <option value="infra_cdn">Infraestrutura CDN / Docker</option>
                                <option value="perf_digital">Gestão de Performance Digital</option>
                            </select>
                        </div>

                        <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-lg hover:bg-indigo-700 hover:shadow-indigo-200 transition-all transform hover:-translate-y-1">
                            CONSOLIDAR ENTREGA E GERAR RELATÓRIO
                        </button>
                    </form>
                </div>
            </article>
        </main>

        <footer class="mt-20 py-10 border-t border-gray-200 bg-white">
            <div class="container mx-auto px-4 text-center">
                <p class="text-sm font-bold text-gray-800">Performance</p>
                <p class="text-xs text-gray-400 mt-2">Modelo e Segurança Jurídica.</p>
                <div class="mt-4 flex justify-center gap-4 text-[10px] uppercase tracking-widest font-bold text-indigo-400">
                    <span>x-Partner</span>
                    <span>•</span>
                    <span>Android Ecosystem</span>
                    <span>•</span>
                    <span>Service Delivery</span>
                </div>
            </div>
        </footer>
    </div>

    <script id="sandx-logic-js">
        document.getElementById('x-Partner-main-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            console.log("Iniciando Consolidação x-Partner");
            
            // Simulação de registro de entrega para o relatório executivo
            setTimeout(() => {
                alert("Protocolo de Entrega Registrado!\n\nOs dados foram consolidados no folder x-Partner conforme o plano de implementação.");
            }, 500);
        });
    </script>
</body>
</html>
